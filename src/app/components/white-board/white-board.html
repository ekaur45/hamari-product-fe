<div class="flex flex-col h-[calc(100vh-130px)] overflow-hidden w-full">
    <!-- Header -->
    <div class="flex-shrink-0">
        <app-whiteboard-top-bar [tabs]="tabs()" (closeEvent)="onCloseWhiteboard()"
            (addTabEvent)="onAddTab($event)">
            <div class="flex flex-wrap items-center gap-2.5">
                <app-whiteboard-color-size-picker [currentColor]="currentColor()"
                    [currentLineWidth]="currentLineWidth()"
                    (colorChangeEvent)="onColorChange($event)"
                    (lineWidthChangeEvent)="onLineWidthChange($event)">
                </app-whiteboard-color-size-picker>

                <app-whiteboard-templates [templates]="templates()"
                    (templateSelectEvent)="onTemplateSelect($event)">
                </app-whiteboard-templates>

                <app-whiteboard-stamps [isActive]="currentTool() === 'stamp'"
                    (stampSelectEvent)="onStampSelect($event)">
                </app-whiteboard-stamps>

                <app-whiteboard-sticky-notes [isActive]="currentTool() === 'stickyNote'"
                    (activateEvent)="selectTool('stickyNoteTool')" (addNoteEvent)="onAddStickyNote($event)">
                </app-whiteboard-sticky-notes>

                <app-whiteboard-math-tools (toolActivateEvent)="onMathToolActivate($event)">
                </app-whiteboard-math-tools>
                <app-whiteboard-action-buttons (clearEvent)="onClear()" (saveEvent)="onSaveWhiteboard()"
                (exportPDFEvent)="onExportPDF()">
            </app-whiteboard-action-buttons>
            </div>
        </app-whiteboard-top-bar>
    </div>
    <div class="grid grid-cols-[auto_1fr] h-full">
        <div class="h-full relative">
            <div
                class="hidden sm:block bg-white/95 backdrop-blur-sm border-r border-gray-200/80 shadow-lg w-full flex-shrink-0 flex flex-col h-full">
                <!-- Top Row: Permissions & Presence -->
                <!-- <div
                    class="px-4 py-3 flex flex-col gap-3 border-b border-gray-200/60 bg-gradient-to-b from-gray-50/80 to-white">
                    <app-whiteboard-permissions [currentRole]="currentUserRole()" [isEditable]="isEditable()"
                        [isLocked]="isLocked()" (toggleLockEvent)="onToggleLock($event)"
                        (clearStudentsEvent)="onClearStudentDrawings()">
                    </app-whiteboard-permissions>

                    <app-whiteboard-presence [activeUsers]="activeUsers()">
                    </app-whiteboard-presence>
                </div> -->

                <!-- Main Toolbar - Vertical Layout -->
                <div class="px-2 py-2 flex flex-col gap-4 flex-1">
                    <!-- All Controls Group - Vertical Stack -->
                    <div class="flex flex-col gap-3">
                        <!-- Select Tool -->
                        <app-whiteboard-select-tool [isActive]="currentTool() === 'select'"
                            [hasSelection]="hasSelection()" [hasClipboard]="hasClipboard()"
                            (activateEvent)="selectTool('selectTool')" (copyEvent)="onCopySelection()"
                            (cutEvent)="onCutSelection()" (pasteEvent)="onPasteSelection()"
                            (alignEvent)="onAlignSelection($event)" (layerEvent)="onLayerChange($event)"
                            (deleteEvent)="onDeleteSelection()">
                        </app-whiteboard-select-tool>

                        <!-- Drawing Tools -->
                        <app-whiteboard-drawing-tools [currentTool]="currentTool()"
                            (toolSelectEvent)="onToolSelect($event)" (imageUploadEvent)="onImageUpload($event)">
                        </app-whiteboard-drawing-tools>

                        <!-- Style Options -->
                        <app-whiteboard-style-options [fillShapes]="fillShapes()" [lineStyle]="lineStyle()"
                            (toggleFillEvent)="onToggleFill()" (lineStyleChangeEvent)="onLineStyleChange($event)">
                        </app-whiteboard-style-options>

                        <!-- Educational Tools Group -->
                    

                        <!-- Canvas Options -->
                        <app-whiteboard-canvas-options [gridVisible]="gridVisible()"
                            (backgroundColorChangeEvent)="onBackgroundColorChange($event)"
                            (toggleGridEvent)="onToggleGridVisible()">
                        </app-whiteboard-canvas-options>

                        <!-- Undo/Redo -->
                        <!-- <app-whiteboard-undo-redo (undoEvent)="onUndo()" (redoEvent)="onRedo()">
                        </app-whiteboard-undo-redo> -->

                        <!-- Zoom Controls -->
                        <!-- <app-whiteboard-zoom-controls [zoomLevel]="zoomLevel()" (zoomInEvent)="onZoomIn()"
                            (zoomOutEvent)="onZoomOut()" (zoomResetEvent)="onZoomReset()">
                        </app-whiteboard-zoom-controls> -->

                        <!-- Action Buttons -->

                    </div>
                </div>
            </div>
        </div>
        <div>
            <div #whiteboardView [class.hidden]="!whiteboardOpen()" class="w-full h-full flex flex-col z-50">
                <!-- Canvas Container -->
                <div #canvasContainer class="flex-1 overflow-hidden bg-gradient-to-br from-gray-100 to-gray-200"
                    style="position: relative;">
                    <div #canvasWrapper
                        style="position: relative; width: 100%; height: 100%; transform-origin: center center; transform: scale(1);">
                        <canvas #whiteboardCanvas 
                            class="shadow-2xl"
                            style="width: 100%; height: 100%; display: block;"
                            width="0" height="0">
                        </canvas>
                        <!-- Grid Overlay -->
                        <canvas #gridCanvas
                            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.25;"
                            width="0" height="0">
                        </canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Equation Editor Dialog -->
<p-dialog [visible]="showEquationDialog()" [modal]="true" [style]="{width: '500px'}" [closable]="true"
    (onHide)="onCloseEquationDialog()" header="Equation Editor">
    <div class="flex flex-col gap-4 p-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">LaTeX Equation</label>
            <textarea [value]="equationLatex()" 
                (input)="equationLatex.set($any($event.target).value)"
                class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm"
                rows="3" placeholder="Enter LaTeX equation, e.g., \frac{a}{b}, x^2 + y^2 = r^2"></textarea>
            <p class="text-xs text-gray-500 mt-1">Use LaTeX syntax for mathematical equations</p>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Size: {{equationSize()}}px</label>
            <input type="range" [value]="equationSize()" 
                (input)="equationSize.set(+$any($event.target).value)"
                min="20" max="100" 
                class="w-full accent-blue-500">
        </div>
        
        @if (equationError()) {
            <div class="p-2 bg-red-50 border border-red-200 rounded text-red-700 text-sm">
                {{equationError()}}
            </div>
        }
        
        <div class="flex gap-2 justify-end">
            <button (click)="onCloseEquationDialog()" 
                class="px-4 py-2 border border-gray-300 rounded-md hover:bg-gray-50">
                Cancel
            </button>
            <button (click)="onSaveEquation()" 
                class="px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600">
                {{editingEquation() ? 'Update' : 'Insert'}} Equation
            </button>
        </div>
    </div>
</p-dialog>
