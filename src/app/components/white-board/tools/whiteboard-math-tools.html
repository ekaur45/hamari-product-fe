<div class="bg-white rounded-lg p-1 border border-gray-300 flex items-center gap-1 relative">
    <button 
        (click)="showMathTools.set(!showMathTools())"
        class="px-2 py-1 hover:bg-gray-100 rounded text-xs text-gray-700 flex items-center gap-1"
        title="Math Tools">
        <i class="fas fa-calculator"></i>
        <span>Math</span>
    </button>
    
    <!-- Math Tools Dropdown -->
    @if(showMathTools()) {
        <div class="absolute top-full left-0 mt-2 bg-white border border-gray-300 rounded-lg shadow-lg p-3 z-50 min-w-[200px]">
            <div class="text-xs font-semibold text-gray-700 mb-3">Math & Science Tools</div>
            
            <div class="space-y-2">
                <button 
                    (click)="activateTool('ruler')"
                    [class.bg-blue-50]="activeTool() === 'ruler'"
                    class="w-full px-3 py-2 text-left border border-gray-300 rounded hover:bg-gray-50 transition flex items-center gap-2">
                    <i class="fas fa-ruler text-gray-600"></i>
                    <span class="text-xs text-gray-700">Ruler</span>
                </button>
                
                <button 
                    (click)="activateTool('protractor')"
                    [class.bg-blue-50]="activeTool() === 'protractor'"
                    class="w-full px-3 py-2 text-left border border-gray-300 rounded hover:bg-gray-50 transition flex items-center gap-2">
                    <i class="fas fa-circle-notch text-gray-600"></i>
                    <span class="text-xs text-gray-700">Protractor</span>
                </button>
                
                <button 
                    (click)="activateTool('equation')"
                    [class.bg-blue-50]="activeTool() === 'equation'"
                    class="w-full px-3 py-2 text-left border border-gray-300 rounded hover:bg-gray-50 transition flex items-center gap-2">
                    <i class="fas fa-square-root-alt text-gray-600"></i>
                    <span class="text-xs text-gray-700">Equation Editor</span>
                </button>
                
                <button 
                    (click)="activateTool('graph')"
                    [class.bg-blue-50]="activeTool() === 'graph'"
                    class="w-full px-3 py-2 text-left border border-gray-300 rounded hover:bg-gray-50 transition flex items-center gap-2">
                    <i class="fas fa-chart-line text-gray-600"></i>
                    <span class="text-xs text-gray-700">Graphing Tool</span>
                </button>
                
                <div class="border-t border-gray-200 my-2"></div>
                
                <button 
                    (click)="activateTool('calculator')"
                    [class.bg-blue-50]="activeTool() === 'calculator'"
                    class="w-full px-3 py-2 text-left border border-gray-300 rounded hover:bg-gray-50 transition flex items-center gap-2">
                    <i class="fas fa-calculator text-gray-600"></i>
                    <span class="text-xs text-gray-700">Calculator</span>
                </button>
            </div>
        </div>
    }
</div>
