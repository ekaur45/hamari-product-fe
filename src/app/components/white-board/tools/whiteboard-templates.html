<div class="bg-white rounded-lg p-1 border border-gray-300 flex items-center gap-1 relative">
    <button 
        (click)="showTemplates.set(!showTemplates())"
        class="px-2 py-1 hover:bg-gray-100 rounded text-xs text-gray-700 flex items-center gap-1"
        title="Templates">
        <i class="fas fa-layer-group"></i>
        <span>Templates</span>
    </button>
    
    <!-- Templates Dropdown -->
    @if(showTemplates()) {
        <div class="absolute top-full left-0 mt-2 bg-white border border-gray-300 rounded-lg shadow-lg p-3 z-50 min-w-[300px]">
            <div class="text-xs font-semibold text-gray-700 mb-2">Page Templates</div>
            
            <div class="grid grid-cols-2 gap-2">
                @for(template of templates(); track template.id) {
                    <button 
                        (click)="selectTemplate(template.id)"
                        class="p-3 border border-gray-300 rounded-lg hover:border-blue-500 hover:bg-blue-50 transition text-left">
                        <div class="flex items-center gap-2 mb-2">
                            <i [class]="template.icon" class="text-gray-600"></i>
                            <span class="text-xs font-medium text-gray-700">{{ template.name }}</span>
                        </div>
                        <div class="h-16 bg-gray-100 rounded flex items-center justify-center overflow-hidden">
                            @if(template.preview) {
                                <img [src]="template.preview" [alt]="template.name" class="w-full h-full object-cover">
                            } @else {
                                <i [class]="template.icon" class="text-gray-400 text-2xl"></i>
                            }
                        </div>
                    </button>
                }
            </div>
        </div>
    }
</div>
