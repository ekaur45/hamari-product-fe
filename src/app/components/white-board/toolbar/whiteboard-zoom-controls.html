<div
    class="border border-gray-200/60 rounded-xl flex flex-wrap items-center gap-2 bg-white shadow-sm">
    <button id="zoomOut" (click)="onZoomOut()"
        class="p-2.5 hover:bg-gray-100 rounded-xl transition-all duration-200 hover:scale-110 active:scale-95"
        title="Zoom Out">
        <i class="fas fa-search-minus text-gray-700 text-base"></i>
    </button>
    <span
        class="px-4 py-2 text-sm text-gray-900 font-bold min-w-[5rem] text-center bg-gradient-to-br from-blue-50 to-blue-100 rounded-xl shadow-sm border border-blue-200/60 font-mono">
        {{ getZoomLevel() }}
    </span>
    <button id="zoomIn" (click)="onZoomIn()"
        class="p-2.5 hover:bg-gray-100 rounded-xl transition-all duration-200 hover:scale-110 active:scale-95"
        title="Zoom In">
        <i class="fas fa-search-plus text-gray-700 text-base"></i>
    </button>
    <button id="zoomReset" (click)="onZoomReset()"
        class="px-3 py-2 hover:bg-gray-100 rounded-xl text-xs text-gray-700 font-semibold transition-all duration-200 hover:scale-105"
        title="Reset Zoom">
        Reset
    </button>
    <button id="centerContent" (click)="onCenterContent()"
        class="p-2.5 hover:bg-gray-100 rounded-xl transition-all duration-200 hover:scale-110 active:scale-95"
        title="Center Content">
        <i class="fas fa-crosshairs text-gray-700 text-base"></i>
    </button>
</div>
