<div class="border-b border-gray-200/60">
    <button (click)="toggle()"
        class="w-full px-4 py-3.5 flex items-center justify-between bg-white hover:bg-gray-50/80 transition-all">
        <div class="flex items-center gap-3">
            <div [class]="'w-11 h-11 rounded-xl bg-gradient-to-br ' + getIconColorClass() + ' flex items-center justify-center shadow-sm'">
                <i [class]="icon() + ' text-lg'"></i>
            </div>
            <span class="text-sm font-bold text-gray-800">{{ title() }}</span>
        </div>
        <i #chevron class="fas fa-chevron-down text-gray-400 transition-transform duration-300"></i>
    </button>
    <div #panel class="hidden px-4 py-4 border-t border-gray-100 bg-gradient-to-b from-gray-50/50 to-white">
        <ng-content></ng-content>
    </div>
</div>
