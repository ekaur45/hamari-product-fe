<div
    class="bg-gradient-to-br from-white to-gray-50/50 rounded-2xl p-2 border border-gray-200/60 shadow-md flex flex-wrap items-center gap-1.5 backdrop-blur-sm">
    <!-- Freehand Tools -->
    <div class="flex items-center gap-1 pr-2 border-r border-gray-200/60">
        <button id="penTool" (click)="selectTool('penTool')"
            [class.bg-gradient-to-br]="isActive('pen')"
            [class.from-blue-500]="isActive('pen')"
            [class.to-blue-600]="isActive('pen')"
            [class.text-white]="isActive('pen')"
            [class.shadow-lg]="isActive('pen')"
            [class.bg-white]="!isActive('pen')"
            [class.hover:bg-gray-50]="!isActive('pen')"
            class="p-3 rounded-xl tool-btn transition-all duration-200 hover:scale-105 active:scale-95"
            title="Pen Tool">
            <i class="fas fa-pen text-base"></i>
        </button>
        <button id="highlighterTool" (click)="selectTool('highlighterTool')"
            [class.bg-gradient-to-br]="isActive('highlighter')"
            [class.from-blue-500]="isActive('highlighter')"
            [class.to-blue-600]="isActive('highlighter')"
            [class.text-white]="isActive('highlighter')"
            [class.shadow-lg]="isActive('highlighter')"
            [class.bg-white]="!isActive('highlighter')"
            [class.hover:bg-gray-50]="!isActive('highlighter')"
            class="p-3 rounded-xl tool-btn transition-all duration-200 hover:scale-105 active:scale-95"
            title="Highlighter">
            <i class="fas fa-highlighter text-base"></i>
        </button>
        <button id="eraserTool" (click)="selectTool('eraserTool')"
            [class.bg-gradient-to-br]="isActive('eraser')"
            [class.from-blue-500]="isActive('eraser')"
            [class.to-blue-600]="isActive('eraser')"
            [class.text-white]="isActive('eraser')"
            [class.shadow-lg]="isActive('eraser')"
            [class.bg-white]="!isActive('eraser')"
            [class.hover:bg-gray-50]="!isActive('eraser')"
            class="p-3 rounded-xl tool-btn transition-all duration-200 hover:scale-105 active:scale-95"
            title="Eraser">
            <i class="fas fa-eraser text-base"></i>
        </button>
    </div>

    <!-- Shapes -->
    <div class="flex items-center gap-1 px-2 border-r border-gray-200/60">
        <button id="shapeTool" (click)="selectTool('shapeTool')"
            [class.bg-gradient-to-br]="isActive('rectangle')"
            [class.from-blue-500]="isActive('rectangle')"
            [class.to-blue-600]="isActive('rectangle')"
            [class.text-white]="isActive('rectangle')"
            [class.shadow-lg]="isActive('rectangle')"
            [class.bg-white]="!isActive('rectangle')"
            [class.hover:bg-gray-50]="!isActive('rectangle')"
            class="p-3 rounded-xl tool-btn transition-all duration-200 hover:scale-105 active:scale-95"
            title="Rectangle">
            <i class="fas fa-square text-base"></i>
        </button>
        <button id="circleTool" (click)="selectTool('circleTool')"
            [class.bg-gradient-to-br]="isActive('circle')"
            [class.from-blue-500]="isActive('circle')"
            [class.to-blue-600]="isActive('circle')"
            [class.text-white]="isActive('circle')"
            [class.shadow-lg]="isActive('circle')"
            [class.bg-white]="!isActive('circle')"
            [class.hover:bg-gray-50]="!isActive('circle')"
            class="p-3 rounded-xl tool-btn transition-all duration-200 hover:scale-105 active:scale-95"
            title="Circle">
            <i class="far fa-circle text-base"></i>
        </button>
        <button id="arrowTool" (click)="selectTool('arrowTool')"
            [class.bg-gradient-to-br]="isActive('arrow')"
            [class.from-blue-500]="isActive('arrow')"
            [class.to-blue-600]="isActive('arrow')"
            [class.text-white]="isActive('arrow')"
            [class.shadow-lg]="isActive('arrow')"
            [class.bg-white]="!isActive('arrow')"
            [class.hover:bg-gray-50]="!isActive('arrow')"
            class="p-3 rounded-xl tool-btn transition-all duration-200 hover:scale-105 active:scale-95"
            title="Arrow">
            <i class="fas fa-arrow-right text-base"></i>
        </button>
        <button id="lineTool" (click)="selectTool('lineTool')"
            [class.bg-gradient-to-br]="isActive('line')"
            [class.from-blue-500]="isActive('line')"
            [class.to-blue-600]="isActive('line')"
            [class.text-white]="isActive('line')"
            [class.shadow-lg]="isActive('line')"
            [class.bg-white]="!isActive('line')"
            [class.hover:bg-gray-50]="!isActive('line')"
            class="p-3 rounded-xl tool-btn transition-all duration-200 hover:scale-105 active:scale-95"
            title="Line">
            <i class="fas fa-minus text-base"></i>
        </button>
    </div>

    <!-- Content Tools -->
    <div class="flex items-center gap-1 pl-2">
        <button id="textTool" (click)="selectTool('textTool')"
            [class.bg-gradient-to-br]="isActive('text')"
            [class.from-blue-500]="isActive('text')"
            [class.to-blue-600]="isActive('text')"
            [class.text-white]="isActive('text')"
            [class.shadow-lg]="isActive('text')"
            [class.bg-white]="!isActive('text')"
            [class.hover:bg-gray-50]="!isActive('text')"
            class="p-3 rounded-xl tool-btn transition-all duration-200 hover:scale-105 active:scale-95"
            title="Text">
            <i class="fas fa-font text-base"></i>
        </button>
        <button id="imageTool" (click)="selectTool('imageTool')"
            [class.bg-gradient-to-br]="isActive('image')"
            [class.from-blue-500]="isActive('image')"
            [class.to-blue-600]="isActive('image')"
            [class.text-white]="isActive('image')"
            [class.shadow-lg]="isActive('image')"
            [class.bg-white]="!isActive('image')"
            [class.hover:bg-gray-50]="!isActive('image')"
            class="p-3 rounded-xl tool-btn transition-all duration-200 hover:scale-105 active:scale-95"
            title="Upload Image">
            <i class="fas fa-image text-base"></i>
        </button>
    </div>
    <input #imageUpload type="file" (change)="onImageUpload($event)" accept="image/*" class="hidden">
</div>
