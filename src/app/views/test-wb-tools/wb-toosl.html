<div class="relative">
    <button #toggleBtn (click)="toggleDropdown()">
        Show
    </button>

    <div class="absolute shadow-sm rounded-md border border-gray-200 min-w-[200px] max-w-[100%]" #dropdownRef
        [ngClass]="{'hidden': !showDropDown()}">
        <div class="flex flex-col gap-2">
            <div
                class="px-4 py-3 border-b border-gray-200 border-b-2 bg-gradient-to-r from-gray-50 to-white flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <p class="font-semibold text-gray-900 text-base">Notifications</p>
                    <span class="px-2 py-0.5 bg-blue-100 text-blue-700 text-xs font-medium rounded-full">
                        {{ 0 }} new
                    </span>
                </div>
                <button class="text-xs text-blue-600 hover:text-blue-700 font-medium transition-colors" type="button">
                    <i class="fas fa-check-double text-green-600 text-sm"></i>
                    Mark all read
                </button>
            </div>
            <div class="flex items-center gap-2 px-4">
                <span
                    class="text-gray-600 hover:text-gray-900 cursor-pointer text-sm border rounded-xl border-gray-200 bg-gray-100 py-1 px-2">
                    All
                </span>
                <span
                    class="text-gray-600 hover:text-gray-900 cursor-pointer text-sm border rounded-xl border-gray-200 bg-gray-100 py-1 px-2">
                    Messages
                </span>
                <span
                    class="text-gray-600 hover:text-gray-900 cursor-pointer text-sm border rounded-xl border-gray-200 bg-gray-100 py-1 px-2">
                    Bookings
                </span>
                <span
                    class="text-gray-600 hover:text-gray-900 cursor-pointer text-sm border rounded-xl border-gray-200 bg-gray-100 py-1 px-2">
                    Payments
                </span>
            </div>
        </div>
        <div class="px-4 py-12 text-center hidden">
            <div class="flex flex-col items-center gap-3">
                <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center">
                    <i class="fas fa-bell text-2xl text-gray-400"></i>
                </div>
                <p class="text-sm font-medium text-gray-500">No notifications</p>
                <p class="text-xs text-gray-400">You're all caught up!</p>
            </div>
        </div>
        <div class="px-1 py-3 flex gap-1 flex-col max-h-[400px] overflow-y-auto">
            <div
                class="flex items-start gap-3 px-4 py-3 rounded-lg hover:bg-gray-50 cursor-pointer transition-all duration-150 border-l-2 border-blue-500 ">

                    <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center">

                    </div>
                </div>
                <div class="flex-1 min-w-0">
